<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mythic Madness: Rune Drift</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;900&family=Space+Mono:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <main class="game-shell">
      <section class="hud">
        <h1>Rune Drift</h1>
        <div class="stats">
          <p>Score: <span id="score">0</span></p>
          <p>Health: <span id="health">100</span></p>
          <p>Wave: <span id="wave">1</span></p>
        </div>
        <p class="tip">Move: WASD or Arrow Keys | Dash: Shift | Blast: Space</p>
      </section>
      <canvas id="game" width="960" height="540" aria-label="Rune Drift game area"></canvas>
      <section class="overlay" id="overlay">
        <div class="card" id="overlay-card">
          <h2 id="overlay-title">Rune Drift</h2>
          <p id="overlay-text">
            Survive escalating waves, collect runes, and blast cursed spirits. Press Enter to begin.
          </p>
        </div>
      </section>
    </main>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
